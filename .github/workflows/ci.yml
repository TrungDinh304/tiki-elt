name: Tiki Lakehouse CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        uv sync --all-extras

    - name: Start required services (MinIO, Postgres, Trino)
      run: |
        # Start minimal services needed for integration-style tests
        docker compose -f docker-compose.yml up -d minio postgres trino
        # Give services a short moment to initialize
        sleep 20

    - name: Python Format Check (Black)
      run: |
        uv run black --check crawler/

    - name: Python Lint (Flake8)
      run: |
        uv run flake8 crawler/ --max-line-length=100

    - name: Run Crawler Tests
      env:
        MINIO_ENDPOINT: "http://localhost:9000"
        MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
        MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        POSTGRES_HOST: "localhost"
        POSTGRES_PORT: "5432"
        POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      run: |
        # Run pytest via uv run to pick up venv explicitly
        uv run pytest crawler/tests/

    - name: SQL Lint (SQLFluff)
      run: |
        cd dbt_tiki && uv run sqlfluff lint models --dialect duckdb
