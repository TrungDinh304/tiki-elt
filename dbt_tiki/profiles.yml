dbt_tiki:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: 'tiki.duckdb'
      extensions:
        - httpfs
        - aws
      settings:
        # Defaults work for host runs (PowerShell). Inside Airflow container,
        # override via env: S3_ENDPOINT_HOST=minio:9000.
        s3_endpoint: "{{ env_var('S3_ENDPOINT_HOST', 'localhost:9000') }}"
        s3_access_key_id: "{{ env_var('MINIO_ACCESS_KEY', 'admin') }}"
        s3_secret_access_key: "{{ env_var('MINIO_SECRET_KEY', 'minio_password') }}"
        s3_region: 'us-east-1'
        s3_use_ssl: false
        s3_url_style: 'path'
      vars:
        bronze_bucket: "{{ env_var('BRONZE_BUCKET', 'bronze') }}"
        silver_bucket: "{{ env_var('SILVER_BUCKET', 'silver') }}"
        lakehouse_bucket: "{{ env_var('LAKEHOUSE_BUCKET', 'lakehouse') }}"
    trino:
      type: trino
      method: none
      user: admin
      password: ""
      host: localhost
      port: 8080
      catalog: iceberg
      schema: marts
      threads: 4
