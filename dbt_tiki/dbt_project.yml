name: 'dbt_tiki'
version: '1.0.0'
config-version: 2

profile: 'dbt_tiki'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  
clean-targets: 
  - "target"
  - "dbt_packages"

models:
  dbt_tiki:
    staging:
      +materialized: external
      +format: "parquet"
      # NOTE: `+location` cannot be set here — dbt-duckdb 1.10+ renders
      # project-level Jinja at parse time when neither `this` nor user
      # macros are bound. Each model's SQL prepends its own
      # `{{ config(location=external_path('silver')) }}` instead.
    marts:
      +materialized: external
      +format: "parquet"
