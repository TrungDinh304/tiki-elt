

services:
  # 1. MINIO - Object Storage Layer
  minio:
    image: minio/minio:latest
    container_name: tiki_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_net
    restart: "no"

  minio-init:
    image: minio/mc:latest
    container_name: tiki_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/bronze;
      /usr/bin/mc mb --ignore-existing myminio/silver;
      /usr/bin/mc mb --ignore-existing myminio/lakehouse;
      exit 0
      "
    networks:
      - lakehouse_net
    restart: "no"

  # 2. POSTGRES - Metastore & Superset Backend
  postgres:
    image: postgres:15
    container_name: tiki_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net
    restart: "no"

  # 3. TRINO - Distributed Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: tiki_trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - trino_metastore:/var/lib/trino/metastore
    networks:
      - lakehouse_net
    restart: "no"
    depends_on:
      - minio
      - postgres

  # 4. SUPERSET - Visualization (BI)
  superset:
    image: apache/superset:latest
    container_name: tiki_superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_LOAD_EXAMPLES: "no"
      SQLALCHEMY_DATABASE_URI: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      PYTHONPATH: "/app/pythonpath:/app/superset_home/.local/lib/python3.10/site-packages"
    networks:
      - lakehouse_net
    restart: "no"
    # Initialize the database and admin user
    entrypoint: >
      /bin/sh -c "
      pip install trino &&
      superset db upgrade &&
      superset fab create-admin --username ${SUPERSET_ADMIN_USER} --firstname Superset --lastname Admin --email admin@lakehouse.local --password ${SUPERSET_ADMIN_PASSWORD} &&
      superset init &&
      gunicorn -w 2 --timeout 120 -b 0.0.0.0:8088 --limit-request-line 0 --limit-request-field_size 0 'superset.app:create_app()'
      "
    depends_on:
      - postgres
      - trino
    
    # 5. Redis - Caching Layer (Optional, can be used for Superset caching or as a cache layer for dbt)
  redis:
    image: redis:latest
    container_name: tiki_redis
    ports:
      - "6379:6379"

  # 6. AIRFLOW - Orchestrator (standalone mode for dev)
  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: tiki-airflow:local
    container_name: tiki_airflow
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      # Admin credentials consumed by airflow/start.sh (not by standalone).
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@local}
      # Propagate lakehouse + crawler config to BashOperator tasks.
      # Hardcoded (NOT substituted from .env) because the MinIO address inside
      # the docker network is always `minio:9000` — overriding via host .env
      # would point boto3/duckdb at localhost:9000 inside the container.
      MINIO_ENDPOINT: http://minio:9000
      # dbt's DuckDB profile uses `host:port` (no scheme) — separate var.
      S3_ENDPOINT_HOST: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET:-lakehouse}
      BUDGET_PER_RUN: ${BUDGET_PER_RUN:-50}
      PAGES_PER_CATEGORY: ${PAGES_PER_CATEGORY:-5}
    volumes:
      - ./dags:/opt/project/dags
      - ./crawler:/opt/project/crawler
      - ./dbt_tiki:/opt/project/dbt_tiki
      - ./airflow_home/logs:/opt/airflow/logs
      - airflow_db:/opt/airflow/db
    # Custom entrypoint: pre-create admin user from AIRFLOW_ADMIN_USER /
    # AIRFLOW_ADMIN_PASSWORD then hand off to airflow standalone (which
    # skips user creation when the admin already exists).
    entrypoint: ["/opt/airflow/start.sh"]
    command: []
    depends_on:
      - postgres
      - minio
    networks:
      - lakehouse_net
    restart: "no"


networks:
  lakehouse_net:
    driver: bridge

volumes:
  minio_data:
  pg_data:
  trino_metastore:
  airflow_db:
