

services:
  # 1. MINIO - Object Storage Layer
  minio:
    image: minio/minio:latest
    container_name: tiki_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - lakehouse_net
    restart: "no"

  minio-init:
    image: minio/mc:latest
    container_name: tiki_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb --ignore-existing myminio/bronze;
      /usr/bin/mc mb --ignore-existing myminio/silver;
      /usr/bin/mc mb --ignore-existing myminio/lakehouse;
      exit 0
      "
    networks:
      - lakehouse_net
    restart: "no"

  # 2. POSTGRES - Airflow metastore + pgvector for RAG embeddings.
  # Image is pgvector/pgvector:pg15 (drop-in for postgres:15) so the chatbot
  # indexer can `CREATE EXTENSION vector` without a separate vector DB service.
  postgres:
    image: pgvector/pgvector:pg15
    container_name: tiki_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - lakehouse_net
    restart: "no"

  # 3. TRINO - Distributed Query Engine
  trino:
    image: trinodb/trino:latest
    container_name: tiki_trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - trino_metastore:/var/lib/trino/metastore
    networks:
      - lakehouse_net
    restart: "no"
    depends_on:
      - minio
      - postgres

  # 4. Redis - Lightweight cache for the crawler's seller-info dedupe path
  # (redis/redis.py). Not on the BI hot path — BI/dashboards are BYO (Power BI
  # Desktop reads marts directly from MinIO via parquet, see README).
  redis:
    image: redis:latest
    container_name: tiki_redis
    ports:
      - "6379:6379"

  # 5. AIRFLOW - Orchestrator (standalone mode for dev)
  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    image: tiki-airflow:local
    container_name: tiki_airflow
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      # Admin credentials consumed by airflow/start.sh (not by standalone).
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@local}
      # Propagate lakehouse + crawler config to BashOperator tasks.
      # Hardcoded (NOT substituted from .env) because the MinIO address inside
      # the docker network is always `minio:9000` — overriding via host .env
      # would point boto3/duckdb at localhost:9000 inside the container.
      MINIO_ENDPOINT: http://minio:9000
      # dbt's DuckDB profile uses `host:port` (no scheme) — separate var.
      S3_ENDPOINT_HOST: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BRONZE_BUCKET: ${BRONZE_BUCKET:-bronze}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET:-lakehouse}
      BUDGET_PER_RUN: ${BUDGET_PER_RUN:-50}
      PAGES_PER_CATEGORY: ${PAGES_PER_CATEGORY:-5}
      # RAG indexer (scripts/rag_index.py) — local sentence-transformers
      # embedding + pgvector upsert. PG_DSN points at the in-network postgres.
      # HF_HOME is mounted onto the `hf_cache` volume so the BGE-M3 weights
      # (~2.3GB) survive container rebuilds and are shared with the chatbot.
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      HF_HOME: /opt/hf_cache
    volumes:
      - ./dags:/opt/project/dags
      - ./crawler:/opt/project/crawler
      - ./dbt_tiki:/opt/project/dbt_tiki
      # Stand-alone DAG scripts (analytics_plot.py, etc.) and their outputs.
      - ./scripts:/opt/project/scripts
      - ./images:/opt/project/images
      - ./airflow_home/logs:/opt/airflow/logs
      - airflow_db:/opt/airflow/db
      - hf_cache:/opt/hf_cache
    # Custom entrypoint: pre-create admin user from AIRFLOW_ADMIN_USER /
    # AIRFLOW_ADMIN_PASSWORD then hand off to airflow standalone (which
    # skips user creation when the admin already exists).
    entrypoint: ["/opt/airflow/start.sh"]
    command: []
    depends_on:
      - postgres
      - minio
    networks:
      - lakehouse_net
    restart: "no"


  # 6. RAG indexer init - one-shot. Runs scripts/rag_index.py on `docker
  # compose up` so the chatbot has embeddings ready out of the box. Reuses
  # the tiki-airflow:local image (already has venv + sentence-transformers).
  # If marts don't exist yet (fresh stack), the script exits 0 with a hint —
  # not a failure — and the user re-runs after the daily pipeline.
  rag-indexer-init:
    build:
      # Reuse the airflow image (same Dockerfile) so this service has the
      # project venv with sentence-transformers + psycopg2-binary already
      # baked in. Compose dedupes the build because both services share
      # the same `image:` tag.
      context: .
      dockerfile: airflow/Dockerfile
    image: tiki-airflow:local
    container_name: tiki_rag_indexer_init
    # Run as root so the Hugging Face cache volume (created by Docker with
    # root ownership) is writable. The airflow image's default UID 50000
    # can't write to /opt/hf_cache otherwise. Safe here — this is a one-shot
    # script, not a long-running airflow process.
    user: "0:0"
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      S3_ENDPOINT_HOST: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET:-lakehouse}
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      HF_HOME: /opt/hf_cache
      # Force unbuffered stdout so `docker logs` shows progress in real time
      # instead of holding prints in a 4KB block buffer until exit.
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./scripts:/opt/project/scripts
      - hf_cache:/opt/hf_cache
    entrypoint:
      - /opt/project-venv/bin/python
      - -u
      - /opt/project/scripts/rag_index.py
    command: []
    networks:
      - lakehouse_net
    restart: "no"

  # 7. CHATBOT - Streamlit RAG UI. Local BGE-M3 embedding (in-container) +
  # external OpenAI-compatible LLM (9router on host by default) for chat
  # completion. The HF model cache is shared with the airflow container via
  # `hf_cache` so the 2.3GB weights download once.
  chatbot:
    build:
      context: ./chatbot
    image: tiki-chatbot:local
    container_name: tiki_chatbot
    ports:
      - "8501:8501"
    # host.docker.internal resolves to the docker host. Docker Desktop sets it
    # automatically; this entry is for parity on Linux where Compose v2 maps
    # `host-gateway` to the host's IP. Lets the chatbot reach 9router (or any
    # LLM gateway you run on the host) without hard-coding the LAN IP.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PG_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      # OpenAI-compatible LLM gateway. Default points at 9router on host; set
      # to a remote endpoint (OpenRouter, DeepSeek paid API, etc) in .env to
      # override.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:20128/v1}
      LLM_API_KEY: ${LLM_API_KEY:-sk-dummy}
      CHAT_MODEL: ${CHAT_MODEL:-gc/gemini-3-flash-preview}
      HF_HOME: /opt/hf_cache
    volumes:
      - hf_cache:/opt/hf_cache
    depends_on:
      - postgres
    networks:
      - lakehouse_net
    restart: "no"


networks:
  lakehouse_net:
    driver: bridge

volumes:
  minio_data:
  pg_data:
  trino_metastore:
  airflow_db:
  # Shared Hugging Face cache for sentence-transformers (BGE-M3 weights).
  # Used by both the airflow venv (indexer DAG) and the chatbot container.
  hf_cache:
